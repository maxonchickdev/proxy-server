services:
  proxy-server-redis:
    container_name: proxy-server-redis
    image: redis:8.0.2-alpine
    restart: unless-stopped
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    volumes:
      - proxy-server-redis-data:/data
    environment:
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DATABASES: ${REDIS_DATABASES}
    env_file: .env
    networks:
      - proxy-server-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'test -z "$$REDIS_PASSWORD" && redis-cli ping | grep PONG || redis-cli --no-auth-warning -a "$$REDIS_PASSWORD" ping | grep PONG',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    hostname: proxy-server-redis

  proxy-server-redis-insight:
    container_name: proxy-server-redis-insight
    image: redislabs/redisinsight:latest
    restart: always
    depends_on:
      proxy-server-redis:
        condition: service_healthy
    ports:
      - ${RI_PORT}:${RI_PORT}
    volumes:
      - proxy-server-redis-insight-data:/usr/src/app/redisinsight/api/data
    environment:
      REDISINSIGHT_DISABLE_ENCRYPTION: ${RI_DISABLE_ENCRYPTION}
    env_file: .env
    networks:
      - proxy-server-network
    command: |
      sh -c " mkdir -p /usr/src/app/redisinsight/api/data && chown -R node:node /usr/src/app/redisinsight/api/data && ./docker-entry.sh "
    hostname: proxy-server-redis-insight
    user: "0:0"

  proxy-server-postgres:
    container_name: proxy-server-postgres
    image: postgres:17.5-alpine3.22
    restart: always
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    volumes:
      - proxy-server-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
    env_file: .env
    networks:
      - proxy-server-network
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    hostname: proxy-server-postgres

volumes:
  proxy-server-redis-data:
    name: proxy-server-redis-data
    driver: local
  proxy-server-redis-insight-data:
    name: proxy-server-redis-insight-data
    driver: local
  proxy-server-postgres-data:
    name: proxy-server-postgres-data
    driver: local

networks:
  proxy-server-network:
    name: proxy-server-network
    driver: bridge
    attachable: true
