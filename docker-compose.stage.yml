services:
  proxy-server-redis-stage:
    container_name: proxy-server-redis-stage
    image: redis:8.0.2-alpine
    restart: unless-stopped
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    volumes:
      - proxy-server-redis-data-stage:/data
    environment:
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DATABASES: ${REDIS_DATABASES}
    env_file: .env.stage
    networks:
      - proxy-server-network-stage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'test -z "$$REDIS_PASSWORD" && redis-cli ping | grep PONG || redis-cli --no-auth-warning -a "$$REDIS_PASSWORD" ping | grep PONG',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    hostname: proxy-server-redis-stage

  proxy-server-postgres-stage:
    container_name: proxy-server-postgres-stage
    image: postgres:17.5-alpine3.22
    restart: always
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    volumes:
      - proxy-server-postgres-data-stage:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
    env_file: .env.stage
    networks:
      - proxy-server-network-stage
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    hostname: proxy-server-postgres-stage

  proxy-server-api-stage:
    container_name: proxy-server-api-stage
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env.stage
    command:
      [
        "sh",
        "-c",
        "npx prisma migrate deploy && node dist/src/main.js",
      ]
    depends_on:
      proxy-server-postgres-stage:
        condition: service_healthy
      proxy-server-redis-stage:
        condition: service_healthy
    networks:
      - proxy-server-network-stage
    ports:
      - "${API_STAGE_PORT:-3000}:3000"

  proxy-server-web-stage:
    container_name: proxy-server-web-stage
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    env_file: .env.stage
    environment:
      API_PROXY_TARGET: http://proxy-server-api-stage:3000
    depends_on:
      - proxy-server-api-stage
    networks:
      - proxy-server-network-stage
    ports:
      - "${WEB_STAGE_PORT:-8080}:4173"

volumes:
  proxy-server-redis-data-stage:
    name: proxy-server-redis-data-stage
    driver: local
  proxy-server-postgres-data-stage:
    name: proxy-server-postgres-data-stage
    driver: local

networks:
  proxy-server-network-stage:
    name: proxy-server-network-stage
    driver: bridge
    attachable: true
